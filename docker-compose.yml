version: '3.8'

# Docker Compose for NotifyHub - Distributed Notification Service
# 
# This file sets up the Kafka infrastructure with improved configuration:
# - Zookeeper: Metadata and coordination for Kafka
# - Kafka: Message broker with auto topic creation enabled
#
# Topics created automatically (with spring.kafka.properties.auto.create.topics.enable=true):
# - user.events: User registration events from User Service
# - email.events: Email notification events
# - sms.events: SMS notification events
# - push.events: Push notification events
# - email.events-dlt: Dead Letter Queue for email failures
# - sms.events-dlt: Dead Letter Queue for SMS failures
# - push.events-dlt: Dead Letter Queue for push failures

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 2181:2181
    healthcheck:
      test: echo srvr | nc -w 2 localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      
      # Enable auto topic creation for demonstration
      # In production, use a dedicated topic management tool
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      
      # Allow deletion of topics (for demo purposes)
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
      
      # Topic configuration
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - /var/lib/kafka/data
